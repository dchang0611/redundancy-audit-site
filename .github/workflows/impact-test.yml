name: Test proposed model changes

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/impact-test.yml"
      - "model_impact_test.py"
      - "publish_impact_test.py"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    env:
      RUN_BACKTEST: "true"
      RUN_IMPACT_TEST: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/cache@v4
        with:
          path: cache_trained_model
          key: impact-test-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            impact-test-cache-${{ runner.os }}-
            redundancy-audit-cache-${{ runner.os }}-
      - run: pip install -r requirements.txt
      - name: Set replay dates
        shell: bash
        run: |
          echo "TARGET_DATE=$(date -u +%F)" >> "$GITHUB_ENV"
          echo "FULL_DATA_END_DATE=$(date -u -d 'yesterday' +%F)" >> "$GITHUB_ENV"
      - name: Run model and controlled replay
        run: python hr_model.py
      - name: Build current site data
        run: python build_site.py
      - name: Publish replay results with the site artifact
        run: python publish_impact_test.py
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: test-and-publish
    steps:
      - name: Publish impact test
        id: deployment
        uses: actions/deploy-pages@v4
