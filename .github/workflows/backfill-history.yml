name: Backfill 30 days of slate history

on:
  push:
    branches: ["main"]
    paths: [".github/workflows/backfill-history.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    strategy:
      fail-fast: false
      matrix:
        group: [0, 1, 2, 3, 4, 5]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/cache@v4
        with:
          path: cache_trained_model
          key: redundancy-audit-cache-${{ runner.os }}-backfill-${{ matrix.group }}
          restore-keys: redundancy-audit-cache-${{ runner.os }}-
      - run: pip install -r requirements.txt
      - name: Rebuild five historical slates
        shell: bash
        env:
          GROUP: ${{ matrix.group }}
          RUN_BACKTEST: "false"
        run: |
          newest=$((GROUP * 5 + 1))
          oldest=$((GROUP * 5 + 5))
          mkdir -p backfill
          for offset in $(seq "$oldest" -1 "$newest"); do
            slate_date=$(date -u -d "$offset days ago" +%F)
            echo "Building $slate_date"
            rm -f trained_hr_model_board_????-??-??.csv
            TARGET_DATE="$slate_date" FULL_DATA_END_DATE=$(date -u -d 'yesterday' +%F) python hr_model.py
            TARGET_DATE="$slate_date" python build_site.py
            if [ -f "site/data/history/$slate_date.json" ]; then
              cp "site/data/history/$slate_date.json" "backfill/$slate_date.json"
            fi
          done
      - uses: actions/upload-artifact@v4
        with:
          name: backfill-${{ matrix.group }}
          path: backfill/*.json
          if-no-files-found: ignore

  assemble:
    runs-on: ubuntu-latest
    needs: backfill
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          pattern: backfill-*
          path: site/data/history
          merge-multiple: true
      - name: Merge history with the live site
        run: python prepare_backfill_deploy.py
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: assemble
    steps:
      - name: Publish backfilled history
        id: deployment
        uses: actions/deploy-pages@v4
